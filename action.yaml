name: "AI Security Analyzer"
description: "Analyze Trivy report using Gemini and comment on PR"

inputs:
  github_token:
    required: true
  google_api_key:
    required: true
  report_path:
    required: false
    default: "trivy-report.json"

runs:
  using: "composite"
  steps:
    # REMOVED: actions/checkout@v4 (This was deleting the user's files)

    - name: Install dependencies
      run: pip install -r ${{ github.action_path }}/requirements.txt
      shell: bash

    - name: Run Analyzer
      run: python ${{ github.action_path }}/analyzer.py
      shell: bash
      env:
        GOOGLE_API_KEY: ${{ inputs.google_api_key }}
        REPORT_PATH: ${{ inputs.report_path }}
        GITHUB_WORKSPACE: ${{ github.workspace }} # Pass this to Python

    - name: Comment PR
      run: python ${{ github.action_path }}/comment_pr.py
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
